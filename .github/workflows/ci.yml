name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pipeline_monitor_test
          POSTGRES_USER: pipeline
          POSTGRES_PASSWORD: pipeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pipeline -d pipeline_monitor_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./backend[dev]
      - name: Run backend tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+psycopg://pipeline:pipeline@localhost:5432/pipeline_monitor_test
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  smoke-and-e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Start application stack
        run: docker compose up --build -d
      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 5
          done
          exit 1
      - name: Run API smoke test
        run: python infra/smoke_test.py
      - name: Run browser end-to-end test
        working-directory: frontend
        run: npm run test:e2e
      - name: Stop application stack
        if: always()
        run: docker compose down -v
