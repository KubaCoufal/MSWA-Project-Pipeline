services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pipeline_monitor
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d pipeline_monitor"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://pipeline:pipeline@postgres:5432/pipeline_monitor
      REDIS_URL: redis://redis:6379/0
      SIMULATION_RUNTIME_SECONDS: 2
      DEFAULT_RECORDS_PROCESSED: 1200
    command: >
      sh -c "python -m alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://pipeline:pipeline@postgres:5432/pipeline_monitor
      REDIS_URL: redis://redis:6379/0
      SIMULATION_RUNTIME_SECONDS: 2
      DEFAULT_RECORDS_PROCESSED: 1200
    command: ["python", "-m", "app.workers.worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_started
    ports:
      - "4173:80"

volumes:
  postgres_data:
